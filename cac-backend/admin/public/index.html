<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAC Couriers — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
      </div>

      <h1 class="login-title">CAC Admin</h1>
      <p class="login-sub">Couriers &amp; Shipping Dashboard</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="admin@test.com" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <p id="loginError" class="error-msg"></p>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-full">Sign In</button>
      </form>

    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
